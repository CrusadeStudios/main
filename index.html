    <style>
        /* 1. Prevent the 'bounce' effect on mobile and lock the scroll */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            position: fixed; /* Crucial for iOS Safari */
        }

        /* 2. The magic container that respects mobile browser bars */
        .ordinal-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Modern fix for dynamic mobile bars */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body onclick="hideHint()">

    <div class="ordinal-wrapper">
        <div id="hint">Click to Interact ⚔️</div>
        
        <iframe 
            src="https://ordinals.com/content/62a12254ea1ce41e6ae065e47447a0c250039dc182952552d35274c9f00fbc63i0"
            allowfullscreen="true"
            allow="fullscreen">
        </iframe>
    </div>

    <script>
        function hideHint() {
            const hint = document.getElementById('hint');
            if (hint) {
                hint.style.opacity = '0';
                // Remove from DOM after fade out so it doesn't exist anymore
                setTimeout(() => hint.remove(), 400);
            }
        }
    </script>

</body>
</html>
