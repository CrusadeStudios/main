<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crusaders of BTC</title>
    <meta name="description" content="A full 3D on-chain city and 3D crusader collection on Bitcoin.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://crusadestudios.com/">
    <meta property="og:title" content="Crusaders of BTC">
    <meta property="og:description" content="Click to experience the 3D right here on X!">
    <meta property="og:image" content="https://i.imgur.com/cNLeBVO.png">

    <meta name="twitter:card" content="player">
    <meta name="twitter:player" content="https://ordinals.com/content/0e2f6097e78bb13efd5ab426633d342425c760d7169fd1914df3a4e986fcee7fi0">
    <meta name="twitter:player:width" content="600">
    <meta name="twitter:player:height" content="600">
    <meta name="twitter:site" content="@CrusadersOfBTC">
    <meta name="twitter:image" content="https://i.imgur.com/cNLeBVO.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .ordinal-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* This ensures the static image shows while the iframe is loading/transparent */
            background: url('https://i.imgur.com/cNLeBVO.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Optional: A subtle "Click to Play" hint that disappears on click */
        #hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            pointer-events: none; /* Crucial: clicks must pass through to the iframe */
            z-index: 2;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body onclick="hideHint()">

    <div class="ordinal-wrapper">
        <div id="hint">Click anywhere to start</div>
        
        <iframe 
            src="https://ordinals.com/content/4e71561c90aeacb88a127be898a8bdc966006defe5041aaafac79452c639a57di0"
            allowfullscreen="true"
            allow="fullscreen">
        </iframe>
    </div>

    <script>
        function hideHint() {
            // Once the user clicks anywhere, hide the hint text
            const hint = document.getElementById('hint');
            if (hint) {
                hint.style.opacity = '0';
                setTimeout(() => hint.remove(), 300);
            }
        }
    </script>

</body>
</html>
