<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crusaders of BTC</title>
    <!-- Your existing Meta Tags remain the same -->

    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Container for both layers */
        .ordinal-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* The Static Overlay */
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.imgur.com/cNLeBVO.png') no-repeat center center;
            background-size: cover;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* Optional Play Button UI */
        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            color: white;
            font-size: 40px;
            pointer-events: none; /* Let the click pass to the overlay */
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ordinal-container">
        <!-- The Static Image Layer -->
        <div id="overlay" onclick="startOrdinal()">
            <div class="play-button">▶</div>
        </div>

        <!-- The Ordinal Content -->
        <iframe id="ordinalFrame" 
                src="https://ordinals.com/content/4e71561c90aeacb88a127be898a8bdc966006defe5041aaafac79452c639a57di0"
                allowfullscreen="true"
                allow="fullscreen">
        </iframe>
    </div>

    <script>
        function startOrdinal() {
            // Hide the overlay
            document.getElementById('overlay').classList.add('hidden');
            
            // Optional: Reload the iframe if you want the animation 
            // to start exactly when they click
            var frame = document.getElementById('ordinalFrame');
            frame.src = frame.src; 
        }
    </script>

</body>
</html>
